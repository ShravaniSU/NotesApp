version: '3.8'

services:
  backend:
    container_name: notes-backend
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:happyData%2117@db:5432/notes_app
      - JWT_SECRET=your_secret_key
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - db
    restart: always
    networks:
      - app-network

  frontend:
    container_name: notes-frontend
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:5000
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
    networks:
      - app-network

  db:
    container_name: notes-db
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=notes_app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=happyData!17
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: always
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge